security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: id

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api_public:
            pattern: ^/api/(health|content)$
            security: false

        api_blog:
            pattern: ^/api/blog
            stateless: true
            provider: app_user_provider
            jwt: ~
            lazy: true

        api_auth:
            pattern: ^/api/auth/(login|register)$
            security: false

        api_forms:
            pattern: ^/api/(contact|orders|inscriptions)$
            methods: [POST]
            security: false

        api_cart_checkout:
            pattern: ^/api/cart/checkout$
            methods: [POST]
            security: false

        uploads:
            pattern: ^/uploads
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api/auth/me, roles: ROLE_USER }
        - { path: ^/api/cart/sync, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
